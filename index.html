<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GalleryX - Modern Image Gallery</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="background"></div>

<header>
<h1>Gallery</h1>
<p>Modern Image Gallery</p>
</header>

<div class="gallery">

<img src="images/img1.jpg" class="gallery-item">
<img src="images/img2.jpg" class="gallery-item">
<img src="images/img3.jpg" class="gallery-item">
<img src="images/img4.jpg" class="gallery-item">
<img src="images/img5.jpg" class="gallery-item">
<img src="images/img6.jpg" class="gallery-item">
<img src="images/img7.jpg" class="gallery-item">
<img src="images/img8.jpg" class="gallery-item">
<img src="images/img9.jpg" class="gallery-item">
<img src="images/img10.jpg" class="gallery-item">

</div>

<div class="lightbox">

<span class="close">
<i class="fas fa-times"></i>
</span>

<button class="prev">
<i class="fas fa-chevron-left"></i>
</button>

<img class="lightbox-img">

<button class="next">
<i class="fas fa-chevron-right"></i>
</button>

</div>

<script src="script.js"></script>

</body>
</html>
